server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      routes:
        # user service (without auth)
        - id: user-service
          uri: lb://USER-SERVICE
          predicates:
            - Path=/user-service/actuator/**, /user-service/signup/**,
          filters:
            - RewritePath=/user-service/(?<segment>.*), /$\{segment}